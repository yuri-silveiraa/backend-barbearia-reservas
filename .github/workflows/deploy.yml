name: deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v5
      - run: |
          set -e
          BASE_DIR="${{ secrets.DEPLOY_BASE_DIR }}"
          cd "$BASE_DIR/backend-barbearia-reservas" && git pull
          cd "$BASE_DIR/front-barbearia" && git pull
          cd "$BASE_DIR/backend-barbearia-reservas"
          docker compose -f docker-compose.deploy.yml up -d --build --no-deps backend
          docker compose -f docker-compose.deploy.yml exec -T backend npx prisma migrate deploy --schema=src/infra/database/prisma/schema.prisma
