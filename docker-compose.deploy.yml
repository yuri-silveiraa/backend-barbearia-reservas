services:
  postgres:
    image: postgres:17
    container_name: db-barbearia
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: barbearia
    volumes:
      - barbearia-db:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d barbearia"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: api-barbearia
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgres://postgres:${POSTGRES_PASSWORD}@postgres:5432/barbearia
      TZ: America/Sao_Paulo
    networks:
      - internal
      - web
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.barbearia-api.rule=(Host(`douglas-barbearia.com`) || Host(`www.douglas-barbearia.com`)) && PathPrefix(`/api`)"
      - "traefik.http.routers.barbearia-api.entrypoints=websecure"
      - "traefik.http.routers.barbearia-api.tls.certresolver=letsencrypt"
      - "traefik.http.routers.barbearia-api.middlewares=barbearia-api-stripprefix@docker"
      - "traefik.http.middlewares.barbearia-api-stripprefix.stripprefix.prefixes=/api"
      - "traefik.http.services.barbearia-api.loadbalancer.server.port=3000"

volumes:
  barbearia-db:

networks:
  internal:
  web:
    external: true